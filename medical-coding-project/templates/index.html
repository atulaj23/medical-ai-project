<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Medical Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Card */
.box {
    background: white;
    width: 420px;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    animation: fadeIn 1s ease-in-out;
}

/* Animation */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(-30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Title */
h2 {
    color: #333;
}

/* Input */
input {
    width: 90%;
    padding: 12px;
    margin-top: 15px;
    border: 1px solid #ccc;
    border-radius: 8px;
    outline: none;
}

/* Button */
button {
    margin-top: 15px;
    padding: 12px 25px;
    border: none;
    background: #007bff;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #0056b3;
    transform: scale(1.05);
}

/* Floating effect */
.box:hover {
    transform: translateY(-5px);
    transition: 0.3s;
}

</style>
</head>

<body>

<div class="box">
    <h2>🏥 AI Medical Dashboard</h2>

    <form method="POST" action="/predict">
        <input type="text" name="symptom" placeholder="Enter symptom (fever, cough...)" required>
        <br>
        <button type="submit">Predict Disease</button>
    </form>
</div>

</body>
</html>
